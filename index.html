const app=initializeApp(firebaseConfig), auth=getAuth(app), db=getFirestore(app);
let currentTab="form", reports=[], signaturePad=null, userId=null, userEmail="", isAdmin=false, unsubscribeReports=null, reportsSnapshotReady=false, notificationAudio=null;
const view=document.getElementById("view"), appNav=document.getElementById("app-nav"), authState=document.getElementById("auth-state"), adminTab=document.querySelector('[data-tab="admin"]');

onAuthStateChanged(auth,async user=>{
  stopReportsSnapshot();
  if(!user){
    userId=null;userEmail="";isAdmin=false;reports=[];authState.textContent="";appNav.classList.add("hidden");adminTab.classList.add("hidden");renderLogin();return;
  }
  const email=(user.email||"").toLowerCase();
  if(!isAllowedUser(email)){await signOut(auth);showNotice("This account is not authorized to use the Service Report application.");return;}
  userId=user.uid;userEmail=email;isAdmin=Object.hasOwn(ADMIN_NAMES,email);
  authState.innerHTML=`<span>${isAdmin?`Admin: ${escapeHtml(ADMIN_NAMES[email])}`:`Technician: ${escapeHtml(email)}`}</span><button id="app-logout" class="ml-3 font-bold text-blue-600" type="button">Logout</button>`;
  document.getElementById("app-logout").onclick=logoutUser;
  appNav.classList.remove("hidden");appNav.classList.add("flex");adminTab.classList.toggle("hidden",!isAdmin);
  if(!isAdmin&&currentTab==="admin") setTab("form");
  startReportsSnapshot();render();
});
function isAllowedUser(email){return Object.hasOwn(ADMIN_NAMES,email)||STAFF_EMAILS.has(email);}
function renderLogin(){view.innerHTML=`<form id="user-login" class="mx-auto max-w-sm space-y-4 py-10"><h2 class="text-xl font-bold text-slate-800">Service Report Login</h2><input id="user-email" type="email" required autocomplete="username" class="field" placeholder="Email"><input id="user-password" type="password" required autocomplete="current-password" class="field" placeholder="Password"><p id="user-login-error" class="hidden text-sm font-semibold text-red-600"></p><button class="btn btn-primary w-full" type="submit">Login</button></form>`;document.getElementById("user-login").onsubmit=userLogin;}
async function userLogin(e){e.preventDefault();const error=document.getElementById("user-login-error");try{const email=document.getElementById("user-email").value.trim().toLowerCase();if(!isAllowedUser(email))throw new Error("This email is not authorized.");await signInWithEmailAndPassword(auth,email,document.getElementById("user-password").value);}catch(err){console.error(err);error.textContent="Login failed: "+formatError(err);error.classList.remove("hidden");}}
async function logoutUser(){await signOut(auth).catch(err=>showNotice("Logout failed: "+formatError(err)));currentTab="form";document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("active",b.dataset.tab==="form"));}
function startReportsSnapshot(){reportsSnapshotReady=false;unsubscribeReports=onSnapshot(query(collection(db,REPORTS_PATH)),snap=>{if(reportsSnapshotReady&&isAdmin&&snap.docChanges().some(change=>change.type==="added")){playNotificationSound();showToast("New service report received.");}reportsSnapshotReady=true;reports=snap.docs.map(d=>({id:d.id,...d.data()}));render();},err=>showNotice("Cannot load service reports: "+formatError(err)));}
function stopReportsSnapshot(){unsubscribeReports?.();unsubscribeReports=null;reportsSnapshotReady=false;}
function unlockNotificationSound(){try{const AudioContext=window.AudioContext||window.webkitAudioContext;if(!AudioContext)return;notificationAudio||=new AudioContext();if(notificationAudio.state==="suspended")notificationAudio.resume();}catch(err){console.warn("Notification sound could not be enabled.",err);}}
function playNotificationSound(){try{unlockNotificationSound();if(!notificationAudio||notificationAudio.state!=="running")return;const now=notificationAudio.currentTime;[880,1175].forEach((frequency,index)=>{const oscillator=notificationAudio.createOscillator(),gain=notificationAudio.createGain(),start=now+index*.12;oscillator.type="sine";oscillator.frequency.setValueAtTime(frequency,start);gain.gain.setValueAtTime(.0001,start);gain.gain.exponentialRampToValueAtTime(.18,start+.02);gain.gain.exponentialRampToValueAtTime(.0001,start+.18);oscillator.connect(gain).connect(notificationAudio.destination);oscillator.start(start);oscillator.stop(start+.2);});}catch(err){console.warn("Notification sound failed.",err);}}
function showToast(message){const toast=document.createElement("div");toast.className="fixed bottom-4 right-4 z-40 rounded-lg bg-slate-900 px-4 py-3 text-sm font-semibold text-white shadow-lg";toast.textContent=message;document.body.appendChild(toast);setTimeout(()=>toast.remove(),3200);}
document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>setTab(b.dataset.tab));
function setTab(tab){ currentTab=tab; document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab)); render(); }
function render(){ if(currentTab==="form") renderForm(); if(currentTab==="logs") renderLogs(); if(currentTab==="admin") renderAdmin(); }

function renderForm(){
view.innerHTML=`<form id="service-form" class="space-y-4">
<div id="print-area" class="report-paper shadow-sm">
  <div class="flex flex-col gap-4 sm:flex-row sm:justify-between"><div><img src="assets/aepl-logo.png?v=2" alt="Airnovation Engineering Pte Ltd" class="h-auto w-full max-w-[420px]"><p class="mt-2 text-xs">48 Toh Guan Road East #07-112 Enterprise Hub Singapore 608586<br>Email: contact@airnovation.com.sg | Tel: 6515 4665</p></div><div class="w-full space-y-2 text-sm sm:w-72"><label class="grid grid-cols-[auto_1fr] items-center gap-2">Date <input id="serviceDate" type="date" class="field line-input min-w-0" required></label><label class="grid grid-cols-[auto_1fr] items-center gap-2">Technician <input id="techName" class="field line-input min-w-0" required></label><label class="grid grid-cols-[auto_1fr] items-center gap-2">Time In <input id="timeIn" type="time" class="field line-input min-w-0" required></label><label class="grid grid-cols-[auto_1fr] items-center gap-2">Time Out <input id="timeOut" type="time" class="field line-input min-w-0" required></label></div></div>
  <div class="section-title mt-5">SERVICE REPORT</div>
  <div class="grid gap-3 py-4 text-sm md:grid-cols-2"><label>Client<input id="clientName" class="field mt-1" required></label><label>Customer Email<input id="customerEmail" type="email" class="field mt-1"></label><label class="md:col-span-2">Address<input id="address" class="field mt-1" required></label><label>Brand<input id="brand" class="field mt-1"></label><label>Model<input id="model" class="field mt-1"></label><label>Serial No.<input id="serialNo" class="field mt-1"></label><label>Quotation / Invoice No.<input id="referenceNo" class="field mt-1"></label></div>
  <div class="section-title">SECTION A</div>
  <div class="space-y-3 py-4 text-sm"><label class="block">Complaint<textarea id="complaints" class="field mt-1" rows="2" required></textarea></label><label class="block">Report<textarea id="reportText" class="field mt-1" rows="3" required></textarea></label><label class="block">Recommendation<textarea id="recommendation" class="field mt-1" rows="2"></textarea></label></div>
  <div class="section-title">SECTION B</div>
  <div class="overflow-x-auto py-3"><table class="report-table w-full min-w-[620px] text-sm"><thead><tr><th>Description</th><th class="w-24">Qty</th><th class="w-24">Unit</th><th class="w-28">Unit Price</th><th class="w-28">Amount</th><th class="no-pdf w-20">Action</th></tr></thead><tbody id="items"></tbody></table><button id="addItem" type="button" class="btn mt-2 bg-slate-200 px-3 py-2 text-slate-700 no-pdf">+ Add Row</button></div>
  <div class="grid gap-3 text-sm md:grid-cols-3"><label>Labour<input id="labour" type="number" step="0.01" class="field mt-1 money"></label><label>Transport<input id="transport" type="number" step="0.01" class="field mt-1 money"></label><label>GST %<input id="gstRate" type="number" step="0.01" value="9" class="field mt-1 money"></label></div>
  <div class="mt-3 ml-auto max-w-sm text-sm"><div class="flex justify-between"><span>Parts</span><strong id="partsDisplay">$0.00</strong></div><div class="flex justify-between"><span>GST</span><strong id="gstDisplay">$0.00</strong></div><div class="flex justify-between border-t mt-1 pt-1 text-base"><span>Total</span><strong id="totalDisplay">$0.00</strong></div></div>
  <div class="mt-5 grid gap-4 border-t pt-4 text-sm md:grid-cols-2"><div><label>Customer Name<input id="signName" class="field mt-1" required></label><label class="mt-3 block">Designation<input id="designation" class="field mt-1"></label><label class="mt-3 flex items-start gap-2"><input id="ack" type="checkbox" class="mt-1" required><span>I acknowledge that the service details above are correct and that the work performed has been explained to me.</span></label></div><div><div class="mb-1 flex justify-between"><strong>Customer Signature</strong><button id="clearSignature" type="button" class="text-xs font-bold text-blue-600 no-pdf">Clear</button></div><canvas id="signature" class="signature"></canvas></div></div>
  <p class="mt-5 text-[9px]">This service report records the work performed and customer acknowledgement. Final records are stored in the company system.</p>
</div>
<div class="mx-auto flex max-w-3xl flex-col gap-3 sm:flex-row"><button id="finalize" class="btn btn-green flex-1" type="submit"><span>Submit</span><span class="loader ml-3 hidden"></span></button><button type="button" class="btn bg-slate-200 text-slate-700" onclick="document.getElementById('service-form').reset(); window.resetSignature();">Clear Form</button></div>
</form>`;
  document.getElementById("serviceDate").value=new Date().toISOString().slice(0,10); addItemRow();
  document.getElementById("addItem").onclick=addItemRow; document.querySelectorAll(".money").forEach(x=>x.oninput=calculateTotals);
  initSignature(); document.getElementById("clearSignature").onclick=()=>signaturePad.clear();

function addItemRow(){ const body=document.getElementById("items"); const tr=document.createElement("tr"); tr.innerHTML=`<td><input class="desc w-full"></td><td><input class="qty w-full text-center" type="number" min="0" step="0.01"></td><td><input class="unit w-full text-center"></td><td><input class="price w-full text-right" type="number" min="0" step="0.01"></td><td><input class="amount w-full text-right" readonly></td><td class="no-pdf text-center"><button type="button" class="remove text-red-600 font-bold">Remove</button></td>`; tr.querySelectorAll(".qty,.price").forEach(x=>x.oninput=calculateTotals); tr.querySelector(".remove").onclick=()=>{ if(body.children.length>1){tr.remove();calculateTotals();} }; body.appendChild(tr); }
function collectItems(){ return [...document.querySelectorAll("#items tr")].map(r=>({description:r.querySelector(".desc").value.trim(),quantity:Number(r.querySelector(".qty").value)||0,unit:r.querySelector(".unit").value.trim(),unitPrice:Number(r.querySelector(".price").value)||0})).filter(x=>x.description); }
function calculateTotals(){ let parts=0; document.querySelectorAll("#items tr").forEach(r=>{const a=(Number(r.querySelector(".qty").value)||0)*(Number(r.querySelector(".price").value)||0); r.querySelector(".amount").value=a?a.toFixed(2):""; parts+=a;}); const labour=Number(document.getElementById("labour")?.value)||0, transport=Number(document.getElementById("transport")?.value)||0, rate=Number(document.getElementById("gstRate")?.value)||0, gst=(parts+labour+transport)*rate/100, total=parts+labour+transport+gst; document.getElementById("partsDisplay").textContent=`$${parts.toFixed(2)}`; document.getElementById("gstDisplay").textContent=`$${gst.toFixed(2)}`; document.getElementById("totalDisplay").textContent=`$${total.toFixed(2)}`; return {parts,labour,transport,gstRate:rate,gst,total}; }
function initSignature(){ const canvas=document.getElementById("signature"), ctx=canvas.getContext("2d"); const resize=()=>{const old=canvas.toDataURL(); canvas.width=canvas.clientWidth*devicePixelRatio; canvas.height=canvas.clientHeight*devicePixelRatio; ctx.scale(devicePixelRatio,devicePixelRatio); ctx.lineWidth=2;ctx.lineCap="round";ctx.strokeStyle="#000080"; if(signaturePad?.hasInk){const img=new Image();img.onload=()=>ctx.drawImage(img,0,0,canvas.clientWidth,canvas.clientHeight);img.src=old;}}; let drawing=false,last=null,hasInk=false; resize(); const pos=e=>{const r=canvas.getBoundingClientRect(),p=e.touches?.[0]||e;return{x:p.clientX-r.left,y:p.clientY-r.top}}; const start=e=>{drawing=true;last=pos(e);}; const move=e=>{if(!drawing)return;e.preventDefault();const p=pos(e);ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(p.x,p.y);ctx.stroke();last=p;hasInk=true;signaturePad.hasInk=true;}; const stop=()=>drawing=false; ["mousedown","touchstart"].forEach(n=>canvas.addEventListener(n,start,{passive:false})); ["mousemove","touchmove"].forEach(n=>canvas.addEventListener(n,move,{passive:false})); ["mouseup","mouseout","touchend"].forEach(n=>canvas.addEventListener(n,stop)); signaturePad={hasInk:false,clear(){ctx.clearRect(0,0,canvas.width,canvas.height);this.hasInk=false;},data(){return canvas.toDataURL("image/png");}}; }
window.resetSignature=()=>signaturePad?.clear();
async function submitReport(e){
  e.preventDefault();
  const form=e.currentTarget;
  const button=document.getElementById("finalize");
  if(!form.reportValidity()) return;
  if(!signaturePad?.hasInk){showNotice("Customer signature is required.");return;}
  setLoading(button,true);
  try{
    const items=collectItems();
    const totals=calculateTotals();
    const client=document.getElementById("clientName").value.trim();
    const serviceDate=document.getElementById("serviceDate").value;
    const tempNo=`SR-${serviceDate.replaceAll("-","")}-${Date.now().toString().slice(-6)}`;
    const payload={
      reportNo:tempNo,
      client,
      customerEmail:document.getElementById("customerEmail").value.trim(),
      address:document.getElementById("address").value.trim(),
      brand:document.getElementById("brand").value.trim(),
      model:document.getElementById("model").value.trim(),
      serialNo:document.getElementById("serialNo").value.trim(),
      referenceNo:document.getElementById("referenceNo").value.trim(),
      serviceDate,
      technician:document.getElementById("techName").value.trim(),
      timeIn:document.getElementById("timeIn").value,
      timeOut:document.getElementById("timeOut").value,
      complaints:document.getElementById("complaints").value.trim(),
      report:document.getElementById("reportText").value.trim(),
      recommendation:document.getElementById("recommendation").value.trim(),
      items,
      totals,
      customerName:document.getElementById("signName").value.trim(),
      designation:document.getElementById("designation").value.trim(),
      signatureData:signaturePad.data(),
      status:"submitted",
      pdfStatus:"on_demand",
      submittedBy:userEmail,
      submitterId:userId,
      timestamp:serverTimestamp()
    };
    await addDoc(collection(db,REPORTS_PATH),payload);
    form.reset();
    signaturePad.clear();
    showNotice(`Report ${tempNo} submitted successfully.\nIt is now visible in the shared Log.`);
    setTimeout(()=>setTab("logs"),500);
  }catch(err){
    console.error(err);
    showNotice("Submission failed. The form has not been cleared.\n\n"+formatError(err));
  }finally{
    setLoading(button,false);
  }
}

function buildPrintableReport(r){
  const itemRows=(r.items||[]).length
    ? r.items.map(i=>`<tr><td>${escapeHtml(i.description||"")}</td><td>${escapeHtml(i.quantity||"")}</td><td>${escapeHtml(i.unit||"")}</td><td class="num">${money(i.unitPrice)}</td><td class="num">${money((Number(i.quantity)||0)*(Number(i.unitPrice)||0))}</td></tr>`).join("")
    : `<tr><td colspan="5" style="height:34px"></td></tr>`;
  const t=r.totals||{};
  return `<div class="pdf-sheet">
    <div class="pdf-head"><div><img class="pdf-logo" src="assets/aepl-logo.png?v=2" alt="Airnovation Engineering Pte Ltd"><p>48 Toh Guan Road East #07-112 Enterprise Hub Singapore 608586<br>contact@airnovation.com.sg · 6515 4665</p></div><div class="meta"><b>${escapeHtml(r.reportNo||"")}</b><p>Date: ${escapeHtml(r.serviceDate||"")}<br>Technician: ${escapeHtml(r.technician||"")}<br>Time: ${escapeHtml(r.timeIn||"")} to ${escapeHtml(r.timeOut||"")}</p></div></div>
    <h2>SERVICE REPORT</h2>
    <table><tr><th>Client</th><td>${escapeHtml(r.client||"")}</td><th>Email</th><td>${escapeHtml(r.customerEmail||"")}</td></tr><tr><th>Address</th><td colspan="3">${escapeHtml(r.address||"")}</td></tr><tr><th>Brand / Model</th><td>${escapeHtml([r.brand,r.model].filter(Boolean).join(" / "))}</td><th>Serial / Ref.</th><td>${escapeHtml([r.serialNo,r.referenceNo].filter(Boolean).join(" / "))}</td></tr></table>
    <h2>SECTION A</h2>
    <table><tr><th>Complaint</th><td>${nl2br(r.complaints)}</td></tr><tr><th>Report</th><td>${nl2br(r.report)}</td></tr><tr><th>Recommendation</th><td>${nl2br(r.recommendation)}</td></tr></table>
    <h2>SECTION B</h2>
    <table><thead><tr><th>Description</th><th>Qty</th><th>Unit</th><th>Unit Price</th><th>Amount</th></tr></thead><tbody>${itemRows}</tbody></table>
    <div class="totals"><p>Parts: <b>${money(t.parts)}</b></p><p>Labour: <b>${money(t.labour)}</b></p><p>Transport: <b>${money(t.transport)}</b></p><p>GST: <b>${money(t.gst)}</b></p><p>Total: <b>${money(t.total)}</b></p></div>
    <div class="sign"><div><b>Customer Name:</b> ${escapeHtml(r.customerName||"")}<br><b>Designation:</b> ${escapeHtml(r.designation||"")}</div><div><b>Customer Signature</b>${r.signatureData?`<img src="${r.signatureData}" alt="Signature">`:""}</div></div>
    <p class="foot">Submitted: ${formatTime(r.timestamp)} · Status: ${statusLabel(r.status)}</p>
  </div>`;
}
function pdfStyles(){return `<style>
  body{font-family:Arial,sans-serif;color:#111;margin:0}.pdf-sheet{width:190mm;padding:8mm;background:white;font-size:11px}.pdf-head{display:flex;justify-content:space-between;gap:20px}.pdf-logo{display:block;width:82mm;height:auto;object-fit:contain;object-position:left center}.pdf-head p,.meta p{font-size:9px;line-height:1.4}.meta{text-align:right}.pdf-sheet h2{background:#475569;color:#fff;text-align:center;font-size:12px;letter-spacing:2px;padding:5px;margin:10px 0 4px}.pdf-sheet table{width:100%;border-collapse:collapse}.pdf-sheet th,.pdf-sheet td{border:1px solid #555;padding:5px;vertical-align:top}.pdf-sheet th{background:#f1f5f9;text-align:left}.num{text-align:right}.totals{margin-left:auto;width:230px;margin-top:8px}.totals p{display:flex;justify-content:space-between;margin:3px 0}.sign{display:grid;grid-template-columns:1fr 1fr;gap:20px;border-top:1px solid #777;margin-top:14px;padding-top:10px}.sign img{display:block;max-width:240px;max-height:90px;margin-top:5px}.foot{font-size:8px;margin-top:12px;color:#555}
</style>`}
function money(v){return `$${(Number(v)||0).toFixed(2)}`}
function nl2br(v){return escapeHtml(v||"").replaceAll("\n","<br>")}
async function downloadReportPdf(r){
  const host=document.createElement("div"); host.style.position="fixed";host.style.left="-10000px";host.innerHTML=pdfStyles()+buildPrintableReport(r);document.body.appendChild(host);
  try{await html2pdf().set({margin:0,filename:`${r.reportNo||"service-report"}.pdf`,image:{type:"jpeg",quality:.96},html2canvas:{scale:2,useCORS:true},jsPDF:{unit:"mm",format:"a4",orientation:"portrait"}}).from(host.querySelector(".pdf-sheet")).save();}
  catch(err){showNotice("PDF generation failed: "+formatError(err));}
  finally{host.remove();}
}
function printReport(r){
  const w=window.open("","_blank"); if(!w){showNotice("Please allow pop-ups to print.");return;}
  w.document.write(`<!doctype html><html><head><title>${escapeHtml(r.reportNo||"Service Report")}</title>${pdfStyles()}</head><body>${buildPrintableReport(r)}<script>window.onload=()=>{window.print()}<\/script></body></html>`);w.document.close();
}

function timestampMillis(value){if(value?.toMillis)return value.toMillis();const parsed=new Date(value||0).getTime();return Number.isNaN(parsed)?0:parsed;}
function sortedReports(){return [...reports].sort((a,b)=>timestampMillis(b.timestamp)-timestampMillis(a.timestamp));}
function renderLogs(){ const rows=sortedReports(); view.innerHTML=`<div class="mb-4 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between"><div><h2 class="text-xl font-bold">Service Report Log</h2><p class="text-sm text-slate-500">Live submission status for technicians and administrators.</p></div></div><div id="logList" class="space-y-3"></div>`; const list=document.getElementById("logList"); if(!rows.length){list.innerHTML=`<div class="py-16 text-center font-semibold text-slate-400">No submitted service reports</div>`;return;} rows.forEach(r=>list.appendChild(reportCard(r,false))); }
function reportCard(r,admin){
  const el=document.createElement("article");
  const status=normalizeStatus(r.status);
  el.className="card border-l-4 border-l-blue-500 p-4";
  el.innerHTML=`<div class="flex flex-col gap-3 sm:flex-row sm:justify-between"><div><h3 class="font-bold text-slate-800">${escapeHtml(r.reportNo||"Service Report")}</h3><p class="text-sm text-slate-600">${escapeHtml(r.client||"")} · ${escapeHtml(r.technician||"")}</p><p class="text-xs text-slate-400">Submitted ${formatTime(r.timestamp)}</p></div><div class="sm:text-right"><span class="badge ${statusClass(status)}">${statusLabel(status)}</span><div class="mt-3 flex flex-wrap gap-2 sm:justify-end"><button class="printPdf btn bg-slate-200 px-3 py-2 text-slate-700" type="button">Print</button><button class="downloadPdf btn btn-primary px-3 py-2" type="button">Download PDF</button></div></div></div>${admin?adminPanel(r):""}`;
  el.querySelector(".downloadPdf").onclick=()=>downloadReportPdf(r);
  el.querySelector(".printPdf").onclick=()=>printReport(r);
  if(admin){el.querySelector(".saveAdmin").onclick=()=>saveAdmin(r.id,el);el.querySelector(".deleteReport").onclick=()=>deleteReport(r);}
  return el;
}
function renderAdmin(){ if(!isAdmin){setTab("form");return;} const rows=sortedReports(); view.innerHTML=`<div class="mb-4"><h2 class="text-xl font-bold">Service Report Administration</h2><p class="text-sm text-slate-500">Download, print and update processing status.</p></div><div id="adminList" class="space-y-3"></div>`; const list=document.getElementById("adminList"); if(!rows.length){list.innerHTML=`<div class="py-16 text-center font-semibold text-slate-400">No reports</div>`;return;} rows.forEach(r=>list.appendChild(reportCard(r,true))); }
function adminPanel(r){ const status=normalizeStatus(r.status); return `<div class="mt-4 grid gap-3 border-t pt-4 md:grid-cols-2"><label class="text-sm font-semibold text-slate-600">ERP Reference<input class="erp field mt-1" value="${escapeAttr(r.erpReference||"")}"></label><label class="text-sm font-semibold text-slate-600">Status<select class="status field mt-1"><option value="submitted" ${status==="submitted"?'selected':''}>Submitted</option><option value="quotation_required" ${status==="quotation_required"?'selected':''}>Quotation Required</option><option value="quotation_submitted" ${status==="quotation_submitted"?'selected':''}>Quotation Submitted</option><option value="invoice_pending" ${status==="invoice_pending"?'selected':''}>Invoice Pending</option><option value="invoice_issued" ${status==="invoice_issued"?'selected':''}>Invoice Issued</option><option value="payment_received_closed" ${status==="payment_received_closed"?'selected':''}>Payment Received – Closed</option><option value="cancelled" ${status==="cancelled"?'selected':''}>Cancelled</option></select></label><label class="text-sm font-semibold text-slate-600 md:col-span-2">Admin Remark<textarea class="remark field mt-1" rows="2">${escapeHtml(r.adminRemark||"")}</textarea></label><div class="flex flex-col gap-2 sm:flex-row md:col-span-2"><button class="saveAdmin btn btn-green">Save Admin Update</button><button class="deleteReport btn btn-red">Delete</button></div></div>`; }
async function saveAdmin(id,el){
  const record=reports.find(x=>x.id===id);
  if(!record){showNotice("Record not found.");return;}
  try{
    await updateDoc(doc(db,REPORTS_PATH,id),{erpReference:el.querySelector(".erp").value.trim(),status:el.querySelector(".status").value,adminRemark:el.querySelector(".remark").value.trim(),statusUpdatedBy:userEmail,statusUpdatedAt:serverTimestamp()});
    showNotice("Admin update saved.");
  }catch(err){showNotice("Admin update failed: "+formatError(err));}
}
async function deleteReport(r){
  if(!confirm(`Delete ${r.reportNo}? This cannot be undone.`))return;
  try{await deleteDoc(doc(db,REPORTS_PATH,r.id));}catch(err){showNotice("Delete failed: "+formatError(err));}
}
const STATUS_LABELS={submitted:"Submitted",quotation_required:"Quotation Required",quotation_submitted:"Quotation Submitted",invoice_pending:"Invoice Pending",invoice_issued:"Invoice Issued",payment_received_closed:"Payment Received – Closed",cancelled:"Cancelled"};
function normalizeStatus(s){return Object.hasOwn(STATUS_LABELS,s)?s:"submitted";} function statusLabel(s){return STATUS_LABELS[normalizeStatus(s)];} function statusClass(s){return({submitted:"bg-blue-100 text-blue-700",quotation_required:"bg-amber-100 text-amber-700",quotation_submitted:"bg-indigo-100 text-indigo-700",invoice_pending:"bg-orange-100 text-orange-700",invoice_issued:"bg-purple-100 text-purple-700",payment_received_closed:"bg-emerald-100 text-emerald-700",cancelled:"bg-red-100 text-red-700"})[normalizeStatus(s)];}
function setLoading(button,on){button.disabled=on;button.querySelector(".loader")?.classList.toggle("hidden",!on);} function formatTime(ts){if(!ts)return "Just now"; if(ts?.toDate)return ts.toDate().toLocaleString(); const d=new Date(ts); return Number.isNaN(d.getTime())?"Just now":d.toLocaleString();} function formatError(e){return [e?.code,e?.message].filter(Boolean).join(": ")||"Unknown error";} function escapeHtml(v){return String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");} function escapeAttr(v){return escapeHtml(v);}
function showNotice(message){document.getElementById("notice-text").textContent=message;document.getElementById("notice").classList.remove("hidden");document.getElementById("notice").classList.add("flex");} window.closeNotice=()=>{document.getElementById("notice").classList.add("hidden");document.getElementById("notice").classList.remove("flex");};
</script>
</body>
</html>
