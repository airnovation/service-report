<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Airnovation Service Report</title>
  <meta name="theme-color" content="#f4f7fb" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: Inter, sans-serif; background:#f4f7fb; }
    h1,h2,h3 { font-family:Poppins,sans-serif; }
    .tab { flex:1; min-height:44px; border-radius:8px; font-weight:700; color:#475569; transition:.2s; }
    .tab.active { background:#fff; color:#2563eb; box-shadow:0 1px 4px rgba(15,23,42,.12); }
    .btn { display:inline-flex; align-items:center; justify-content:center; border-radius:8px; font-weight:700; padding:.7rem 1rem; transition:.2s; }
    .btn:disabled { opacity:.55; cursor:not-allowed; }
    .btn-primary { background:#2563eb; color:#fff; }
    .btn-green { background:#059669; color:#fff; }
    .btn-red { background:#dc2626; color:#fff; }
    .field { width:100%; border:1px solid #cbd5e1; border-radius:7px; padding:.58rem .68rem; background:#fff; }
    .field:focus { outline:2px solid rgba(37,99,235,.2); border-color:#2563eb; }
    .card { background:#fff; border:1px solid #e2e8f0; border-radius:10px; box-shadow:0 1px 3px rgba(15,23,42,.06); }
    .badge { display:inline-flex; border-radius:999px; padding:.2rem .6rem; font-size:.75rem; font-weight:700; }
    .loader { width:18px; height:18px; border-radius:999px; border:3px solid rgba(255,255,255,.4); border-top-color:#fff; animation:spin 1s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .signature { width:100%; height:110px; border:1px dashed #94a3b8; border-radius:7px; background:#f8fafc; touch-action:none; }
    .report-paper { width:794px; max-width:100%; margin:auto; background:#fff; color:#111827; padding:28px; }
    .report-table th,.report-table td { border:1px solid #64748b; padding:5px; vertical-align:top; }
    .section-title { background:#475569; color:white; text-align:center; font-weight:700; padding:5px; letter-spacing:.12em; }
    .line-input { border:0; border-bottom:1px solid #64748b; border-radius:0; padding:.2rem .3rem; background:transparent; }
    @media (max-width:800px) { .report-paper { width:100%; padding:15px; } }
  </style>
</head>
<body>
<main class="mx-auto max-w-6xl p-3 md:p-8">
  <header class="mb-5 flex flex-col gap-2 sm:flex-row sm:items-end sm:justify-between">
    <div><h1 class="text-2xl md:text-4xl font-bold text-slate-800">Service Report</h1><p class="font-medium text-slate-500">Airnovation Engineering Pte Ltd Â· Browser-only test</p></div>
    <div id="auth-state" class="text-sm font-semibold text-slate-500"></div>
  </header>
  <section class="rounded-xl bg-white p-2 shadow-lg shadow-slate-200/70">
    <nav id="app-nav" class="hidden gap-1 rounded-lg bg-slate-100 p-1 sm:flex">
      <button class="tab active" data-tab="form">Service Form</button>
      <button class="tab" data-tab="logs">Log</button>
      <button class="tab" data-tab="admin">Admin</button>
    </nav>
    <div id="view" class="min-h-[430px] p-2 md:p-5"></div>
  </section>
</main>
<div id="notice" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/60 p-4"><div class="card w-full max-w-md p-6"><p id="notice-text" class="whitespace-pre-line text-base font-semibold text-slate-800"></p><button class="btn btn-primary mt-5 w-full" onclick="closeNotice()">OK</button></div></div>

<script>
const STORAGE_KEY="airnovation_service_report_test_v1";
let currentTab="form", reports=loadReports(), signaturePad=null;
const view=document.getElementById("view"), appNav=document.getElementById("app-nav"), authState=document.getElementById("auth-state");
const channel="BroadcastChannel" in window ? new BroadcastChannel("airnovation-service-report-test") : null;

authState.textContent="Local Test Mode Â· No Firebase Â· No login";
appNav.classList.remove("hidden"); appNav.classList.add("flex");
channel?.addEventListener("message",()=>{ reports=loadReports(); render(); });
window.addEventListener("storage",e=>{ if(e.key===STORAGE_KEY){ reports=loadReports(); render(); } });
function loadReports(){ try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]");}catch{return [];} }
function saveReports(){ localStorage.setItem(STORAGE_KEY,JSON.stringify(reports)); channel?.postMessage("updated"); }
function makeId(){ return crypto.randomUUID?.() || `local-${Date.now()}-${Math.random().toString(16).slice(2)}`; }
document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>setTab(b.dataset.tab));
function setTab(tab){ currentTab=tab; document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab)); render(); }
function render(){ if(currentTab==="form") renderForm(); if(currentTab==="logs") renderLogs(); if(currentTab==="admin") renderAdmin(); }

function renderForm(){
view.innerHTML=`<form id="service-form" class="space-y-4">
<div id="print-area" class="report-paper shadow-sm">
  <div class="flex justify-between gap-4"><div><h2 class="text-3xl font-bold"><span class="text-red-600">AIR</span>NOVATION</h2><p class="text-sm font-bold tracking-widest">ENGINEERING PTE LTD</p><p class="mt-2 text-xs">48 Toh Guan Road East #07-112 Enterprise Hub Singapore 608586<br>Email: contact@airnovation.com.sg | Tel: 6515 4665</p></div><div class="w-72 text-sm space-y-2"><label class="flex gap-2">Date <input id="serviceDate" type="date" class="field line-input" required></label><label class="flex gap-2">Technician <input id="techName" class="field line-input" required></label><label class="flex gap-2">Time In <input id="timeIn" type="time" class="field line-input" required></label><label class="flex gap-2">Time Out <input id="timeOut" type="time" class="field line-input" required></label></div></div>
  <div class="section-title mt-5">SERVICE REPORT</div>
  <div class="grid gap-3 py-4 text-sm md:grid-cols-2"><label>Client<input id="clientName" class="field mt-1" required></label><label>Customer Email<input id="customerEmail" type="email" class="field mt-1"></label><label class="md:col-span-2">Address<input id="address" class="field mt-1" required></label><label>Brand<input id="brand" class="field mt-1"></label><label>Model<input id="model" class="field mt-1"></label><label>Serial No.<input id="serialNo" class="field mt-1"></label><label>Quotation / Invoice No.<input id="referenceNo" class="field mt-1"></label></div>
  <div class="section-title">SECTION A</div>
  <div class="space-y-3 py-4 text-sm"><label class="block">Complaint<textarea id="complaints" class="field mt-1" rows="2" required></textarea></label><label class="block">Report<textarea id="reportText" class="field mt-1" rows="3" required></textarea></label><label class="block">Recommendation<textarea id="recommendation" class="field mt-1" rows="2"></textarea></label></div>
  <div class="section-title">SECTION B</div>
  <div class="overflow-x-auto py-3"><table class="report-table w-full min-w-[620px] text-sm"><thead><tr><th>Description</th><th class="w-24">Qty</th><th class="w-24">Unit</th><th class="w-28">Unit Price</th><th class="w-28">Amount</th><th class="no-pdf w-20">Action</th></tr></thead><tbody id="items"></tbody></table><button id="addItem" type="button" class="btn mt-2 bg-slate-200 px-3 py-2 text-slate-700 no-pdf">+ Add Row</button></div>
  <div class="grid gap-3 text-sm md:grid-cols-3"><label>Labour<input id="labour" type="number" step="0.01" class="field mt-1 money"></label><label>Transport<input id="transport" type="number" step="0.01" class="field mt-1 money"></label><label>GST %<input id="gstRate" type="number" step="0.01" value="9" class="field mt-1 money"></label></div>
  <div class="mt-3 ml-auto max-w-sm text-sm"><div class="flex justify-between"><span>Parts</span><strong id="partsDisplay">$0.00</strong></div><div class="flex justify-between"><span>GST</span><strong id="gstDisplay">$0.00</strong></div><div class="flex justify-between border-t mt-1 pt-1 text-base"><span>Total</span><strong id="totalDisplay">$0.00</strong></div></div>
  <div class="mt-5 grid gap-4 border-t pt-4 text-sm md:grid-cols-2"><div><label>Customer Name<input id="signName" class="field mt-1" required></label><label class="mt-3 block">Designation<input id="designation" class="field mt-1"></label><label class="mt-3 flex items-start gap-2"><input id="ack" type="checkbox" class="mt-1" required><span>I acknowledge that the service details above are correct and that the work performed has been explained to me.</span></label></div><div><div class="mb-1 flex justify-between"><strong>Customer Signature</strong><button id="clearSignature" type="button" class="text-xs font-bold text-blue-600 no-pdf">Clear</button></div><canvas id="signature" class="signature"></canvas></div></div>
  <p class="mt-5 text-[9px]">This service report records the work performed and customer acknowledgement. Final records are stored in the company system.</p>
</div>
<div class="mx-auto flex max-w-3xl flex-col gap-3 sm:flex-row"><button id="finalize" class="btn btn-green flex-1" type="submit"><span>Finalize & Lock</span><span class="loader ml-3 hidden"></span></button><button type="button" class="btn bg-slate-200 text-slate-700" onclick="document.getElementById('service-form').reset(); window.resetSignature();">Clear Form</button></div>
</form>`;
  document.getElementById("serviceDate").value=new Date().toISOString().slice(0,10); addItemRow();
  document.getElementById("addItem").onclick=addItemRow; document.querySelectorAll(".money").forEach(x=>x.oninput=calculateTotals);
  initSignature(); document.getElementById("clearSignature").onclick=()=>signaturePad.clear();
  document.getElementById("service-form").onsubmit=submitReport;
}
function addItemRow(){ const body=document.getElementById("items"); const tr=document.createElement("tr"); tr.innerHTML=`<td><input class="desc w-full"></td><td><input class="qty w-full text-center" type="number" min="0" step="0.01"></td><td><input class="unit w-full text-center"></td><td><input class="price w-full text-right" type="number" min="0" step="0.01"></td><td><input class="amount w-full text-right" readonly></td><td class="no-pdf text-center"><button type="button" class="remove text-red-600 font-bold">Remove</button></td>`; tr.querySelectorAll(".qty,.price").forEach(x=>x.oninput=calculateTotals); tr.querySelector(".remove").onclick=()=>{ if(body.children.length>1){tr.remove();calculateTotals();} }; body.appendChild(tr); }
function collectItems(){ return [...document.querySelectorAll("#items tr")].map(r=>({description:r.querySelector(".desc").value.trim(),quantity:Number(r.querySelector(".qty").value)||0,unit:r.querySelector(".unit").value.trim(),unitPrice:Number(r.querySelector(".price").value)||0})).filter(x=>x.description); }
function calculateTotals(){ let parts=0; document.querySelectorAll("#items tr").forEach(r=>{const a=(Number(r.querySelector(".qty").value)||0)*(Number(r.querySelector(".price").value)||0); r.querySelector(".amount").value=a?a.toFixed(2):""; parts+=a;}); const labour=Number(document.getElementById("labour")?.value)||0, transport=Number(document.getElementById("transport")?.value)||0, rate=Number(document.getElementById("gstRate")?.value)||0, gst=(parts+labour+transport)*rate/100, total=parts+labour+transport+gst; document.getElementById("partsDisplay").textContent=`$${parts.toFixed(2)}`; document.getElementById("gstDisplay").textContent=`$${gst.toFixed(2)}`; document.getElementById("totalDisplay").textContent=`$${total.toFixed(2)}`; return {parts,labour,transport,gstRate:rate,gst,total}; }
function initSignature(){ const canvas=document.getElementById("signature"), ctx=canvas.getContext("2d"); const resize=()=>{const old=canvas.toDataURL(); canvas.width=canvas.clientWidth*devicePixelRatio; canvas.height=canvas.clientHeight*devicePixelRatio; ctx.scale(devicePixelRatio,devicePixelRatio); ctx.lineWidth=2;ctx.lineCap="round";ctx.strokeStyle="#000080"; if(signaturePad?.hasInk){const img=new Image();img.onload=()=>ctx.drawImage(img,0,0,canvas.clientWidth,canvas.clientHeight);img.src=old;}}; let drawing=false,last=null,hasInk=false; resize(); const pos=e=>{const r=canvas.getBoundingClientRect(),p=e.touches?.[0]||e;return{x:p.clientX-r.left,y:p.clientY-r.top}}; const start=e=>{drawing=true;last=pos(e);}; const move=e=>{if(!drawing)return;e.preventDefault();const p=pos(e);ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(p.x,p.y);ctx.stroke();last=p;hasInk=true;signaturePad.hasInk=true;}; const stop=()=>drawing=false; ["mousedown","touchstart"].forEach(n=>canvas.addEventListener(n,start,{passive:false})); ["mousemove","touchmove"].forEach(n=>canvas.addEventListener(n,move,{passive:false})); ["mouseup","mouseout","touchend"].forEach(n=>canvas.addEventListener(n,stop)); signaturePad={hasInk:false,clear(){ctx.clearRect(0,0,canvas.width,canvas.height);this.hasInk=false;},data(){return canvas.toDataURL("image/png");}}; }
window.resetSignature=()=>signaturePad?.clear();
async function submitReport(e){
  e.preventDefault();
  const form=e.currentTarget;
  const button=document.getElementById("finalize");
  if(!form.reportValidity()) return;
  if(!signaturePad?.hasInk){showNotice("Customer signature is required.");return;}
  setLoading(button,true);
  try{
    const items=collectItems();
    const totals=calculateTotals();
    const client=document.getElementById("clientName").value.trim();
    const serviceDate=document.getElementById("serviceDate").value;
    const tempNo=`SR-${serviceDate.replaceAll("-","")}-${Date.now().toString().slice(-6)}`;
    const payload={
      reportNo:tempNo,
      client,
      customerEmail:document.getElementById("customerEmail").value.trim(),
      address:document.getElementById("address").value.trim(),
      brand:document.getElementById("brand").value.trim(),
      model:document.getElementById("model").value.trim(),
      serialNo:document.getElementById("serialNo").value.trim(),
      referenceNo:document.getElementById("referenceNo").value.trim(),
      serviceDate,
      technician:document.getElementById("techName").value.trim(),
      timeIn:document.getElementById("timeIn").value,
      timeOut:document.getElementById("timeOut").value,
      complaints:document.getElementById("complaints").value.trim(),
      report:document.getElementById("reportText").value.trim(),
      recommendation:document.getElementById("recommendation").value.trim(),
      items,
      totals,
      customerName:document.getElementById("signName").value.trim(),
      designation:document.getElementById("designation").value.trim(),
      signatureData:signaturePad.data(),
      status:"submitted",
      pdfStatus:"on_demand",
      submittedBy:"Local Test User",
      submitterId:"local-test",
      timestamp:new Date().toISOString()
    };
    payload.id=makeId();
    reports.unshift(payload);
    saveReports();
    form.reset();
    signaturePad.clear();
    showNotice(`Report ${tempNo} submitted successfully.\nIt is now visible in the shared Log.`);
    setTimeout(()=>setTab("logs"),500);
  }catch(err){
    console.error(err);
    showNotice("Submission failed. The form has not been cleared.\n\n"+formatError(err));
  }finally{
    setLoading(button,false);
  }
}

function buildPrintableReport(r){
  const itemRows=(r.items||[]).length
    ? r.items.map(i=>`<tr><td>${escapeHtml(i.description||"")}</td><td>${escapeHtml(i.quantity||"")}</td><td>${escapeHtml(i.unit||"")}</td><td class="num">${money(i.unitPrice)}</td><td class="num">${money((Number(i.quantity)||0)*(Number(i.unitPrice)||0))}</td></tr>`).join("")
    : `<tr><td colspan="5" style="height:34px"></td></tr>`;
  const t=r.totals||{};
  return `<div class="pdf-sheet">
    <div class="pdf-head"><div><h1><span>AIR</span>NOVATION</h1><b>ENGINEERING PTE LTD</b><p>48 Toh Guan Road East #07-112 Enterprise Hub Singapore 608586<br>contact@airnovation.com.sg Â· 6515 4665</p></div><div class="meta"><b>${escapeHtml(r.reportNo||"")}</b><p>Date: ${escapeHtml(r.serviceDate||"")}<br>Technician: ${escapeHtml(r.technician||"")}<br>Time: ${escapeHtml(r.timeIn||"")} to ${escapeHtml(r.timeOut||"")}</p></div></div>
    <h2>SERVICE REPORT</h2>
    <table><tr><th>Client</th><td>${escapeHtml(r.client||"")}</td><th>Email</th><td>${escapeHtml(r.customerEmail||"")}</td></tr><tr><th>Address</th><td colspan="3">${escapeHtml(r.address||"")}</td></tr><tr><th>Brand / Model</th><td>${escapeHtml([r.brand,r.model].filter(Boolean).join(" / "))}</td><th>Serial / Ref.</th><td>${escapeHtml([r.serialNo,r.referenceNo].filter(Boolean).join(" / "))}</td></tr></table>
    <h2>SECTION A</h2>
    <table><tr><th>Complaint</th><td>${nl2br(r.complaints)}</td></tr><tr><th>Report</th><td>${nl2br(r.report)}</td></tr><tr><th>Recommendation</th><td>${nl2br(r.recommendation)}</td></tr></table>
    <h2>SECTION B</h2>
    <table><thead><tr><th>Description</th><th>Qty</th><th>Unit</th><th>Unit Price</th><th>Amount</th></tr></thead><tbody>${itemRows}</tbody></table>
    <div class="totals"><p>Parts: <b>${money(t.parts)}</b></p><p>Labour: <b>${money(t.labour)}</b></p><p>Transport: <b>${money(t.transport)}</b></p><p>GST: <b>${money(t.gst)}</b></p><p>Total: <b>${money(t.total)}</b></p></div>
    <div class="sign"><div><b>Customer Name:</b> ${escapeHtml(r.customerName||"")}<br><b>Designation:</b> ${escapeHtml(r.designation||"")}</div><div><b>Customer Signature</b>${r.signatureData?`<img src="${r.signatureData}" alt="Signature">`:""}</div></div>
    <p class="foot">Submitted: ${formatTime(r.timestamp)} Â· Status: ${statusLabel(r.status)}</p>
  </div>`;
}
function pdfStyles(){return `<style>
  body{font-family:Arial,sans-serif;color:#111;margin:0}.pdf-sheet{width:190mm;padding:8mm;background:white;font-size:11px}.pdf-head{display:flex;justify-content:space-between;gap:20px}.pdf-head h1{margin:0;font-size:26px}.pdf-head h1 span{color:#dc2626}.pdf-head p,.meta p{font-size:9px;line-height:1.4}.meta{text-align:right}.pdf-sheet h2{background:#475569;color:#fff;text-align:center;font-size:12px;letter-spacing:2px;padding:5px;margin:10px 0 4px}.pdf-sheet table{width:100%;border-collapse:collapse}.pdf-sheet th,.pdf-sheet td{border:1px solid #555;padding:5px;vertical-align:top}.pdf-sheet th{background:#f1f5f9;text-align:left}.num{text-align:right}.totals{margin-left:auto;width:230px;margin-top:8px}.totals p{display:flex;justify-content:space-between;margin:3px 0}.sign{display:grid;grid-template-columns:1fr 1fr;gap:20px;border-top:1px solid #777;margin-top:14px;padding-top:10px}.sign img{display:block;max-width:240px;max-height:90px;margin-top:5px}.foot{font-size:8px;margin-top:12px;color:#555}
</style>`}
function money(v){return `$${(Number(v)||0).toFixed(2)}`}
function nl2br(v){return escapeHtml(v||"").replaceAll("\n","<br>")}
async function downloadReportPdf(r){
  const host=document.createElement("div"); host.style.position="fixed";host.style.left="-10000px";host.innerHTML=pdfStyles()+buildPrintableReport(r);document.body.appendChild(host);
  try{await html2pdf().set({margin:0,filename:`${r.reportNo||"service-report"}.pdf`,image:{type:"jpeg",quality:.96},html2canvas:{scale:2,useCORS:true},jsPDF:{unit:"mm",format:"a4",orientation:"portrait"}}).from(host.querySelector(".pdf-sheet")).save();}
  catch(err){showNotice("PDF generation failed: "+formatError(err));}
  finally{host.remove();}
}
function printReport(r){
  const w=window.open("","_blank"); if(!w){showNotice("Please allow pop-ups to print.");return;}
  w.document.write(`<!doctype html><html><head><title>${escapeHtml(r.reportNo||"Service Report")}</title>${pdfStyles()}</head><body>${buildPrintableReport(r)}<script>window.onload=()=>{window.print()}<\/script></body></html>`);w.document.close();
}

function sortedReports(){ return [...reports].sort((a,b)=>new Date(b.timestamp||0)-new Date(a.timestamp||0)); }
function renderLogs(){ const rows=sortedReports(); view.innerHTML=`<div class="mb-4 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between"><div><h2 class="text-xl font-bold">Service Report Log</h2><p class="text-sm text-slate-500">Shared submission status for technicians and administrators.</p></div><button id="refreshLog" class="btn bg-slate-200 text-slate-700">Refresh</button></div><div id="logList" class="space-y-3"></div>`; document.getElementById("refreshLog").onclick=()=>{reports=loadReports();renderLogs();}; const list=document.getElementById("logList"); if(!rows.length){list.innerHTML=`<div class="py-16 text-center font-semibold text-slate-400">No submitted service reports</div>`;return;} rows.forEach(r=>list.appendChild(reportCard(r,false))); }
function reportCard(r,admin){
  const el=document.createElement("article");
  const status=normalizeStatus(r.status);
  el.className="card border-l-4 border-l-blue-500 p-4";
  el.innerHTML=`<div class="flex flex-col gap-3 sm:flex-row sm:justify-between"><div><h3 class="font-bold text-slate-800">${escapeHtml(r.reportNo||"Service Report")}</h3><p class="text-sm text-slate-600">${escapeHtml(r.client||"")} Â· ${escapeHtml(r.technician||"")}</p><p class="text-xs text-slate-400">Submitted ${formatTime(r.timestamp)}</p></div><div class="sm:text-right"><span class="badge ${statusClass(status)}">${statusLabel(status)}</span><div class="mt-3 flex flex-wrap gap-2 sm:justify-end"><button class="printPdf btn bg-slate-200 px-3 py-2 text-slate-700" type="button">Print</button><button class="downloadPdf btn btn-primary px-3 py-2" type="button">Download PDF</button></div></div></div>${admin?adminPanel(r):""}`;
  el.querySelector(".downloadPdf").onclick=()=>downloadReportPdf(r);
  el.querySelector(".printPdf").onclick=()=>printReport(r);
  if(admin){el.querySelector(".saveAdmin").onclick=()=>saveAdmin(r.id,el);el.querySelector(".deleteReport").onclick=()=>deleteReport(r);}
  return el;
}
function renderAdmin(){ const rows=sortedReports(); view.innerHTML=`<div class="mb-4"><h2 class="text-xl font-bold">Service Report Administration</h2><p class="text-sm text-slate-500">Download, print, email and update processing status.</p></div><div id="adminList" class="space-y-3"></div>`; const list=document.getElementById("adminList"); if(!rows.length){list.innerHTML=`<div class="py-16 text-center font-semibold text-slate-400">No reports</div>`;return;} rows.forEach(r=>list.appendChild(reportCard(r,true))); }
function adminPanel(r){ return `<div class="mt-4 grid gap-3 border-t pt-4 md:grid-cols-2"><label class="text-sm font-semibold text-slate-600">ERP Reference<input class="erp field mt-1" value="${escapeAttr(r.erpReference||"")}"></label><label class="text-sm font-semibold text-slate-600">Status<select class="status field mt-1"><option value="submitted" ${r.status==="submitted"?'selected':''}>Submitted</option><option value="processing" ${r.status==="processing"?'selected':''}>Processing</option><option value="erp_recorded" ${r.status==="erp_recorded"?'selected':''}>ERP Recorded</option><option value="sent" ${r.status==="sent"?'selected':''}>Sent to Customer</option><option value="completed" ${r.status==="completed"?'selected':''}>Completed</option></select></label><label class="text-sm font-semibold text-slate-600 md:col-span-2">Admin Remark<textarea class="remark field mt-1" rows="2">${escapeHtml(r.adminRemark||"")}</textarea></label><div class="flex flex-wrap gap-2 md:col-span-2"><button class="saveAdmin btn btn-green">Save Admin Update</button><a class="btn bg-slate-200 text-slate-700" href="mailto:${encodeURIComponent(r.customerEmail||'')}?subject=${encodeURIComponent('Service Report '+(r.reportNo||''))}&body=${encodeURIComponent('Dear Customer,\n\nPlease find attached service report '+(r.reportNo||'')+'.\n\nRegards,\nAirnovation Engineering Pte Ltd')}">Open Email</a><button class="deleteReport btn btn-red">Delete</button></div></div>`; }
async function saveAdmin(id,el){
  const record=reports.find(x=>x.id===id);
  if(!record){showNotice("Record not found.");return;}
  record.erpReference=el.querySelector(".erp").value.trim();
  record.status=el.querySelector(".status").value;
  record.adminRemark=el.querySelector(".remark").value.trim();
  record.statusUpdatedBy="Local Test Admin";
  record.statusUpdatedAt=new Date().toISOString();
  saveReports(); render(); showNotice("Admin update saved locally.");
}
async function deleteReport(r){
  if(!confirm(`Delete ${r.reportNo}? This cannot be undone.`))return;
  reports=reports.filter(x=>x.id!==r.id); saveReports(); render();
}
function normalizeStatus(s){return s||"submitted";} function statusLabel(s){return({submitted:"Submitted",processing:"Processing",erp_recorded:"ERP Recorded",sent:"Sent to Customer",completed:"Completed"})[normalizeStatus(s)]||"Submitted";} function statusClass(s){return({submitted:"bg-red-100 text-red-700",processing:"bg-blue-100 text-blue-700",erp_recorded:"bg-amber-100 text-amber-700",sent:"bg-purple-100 text-purple-700",completed:"bg-emerald-100 text-emerald-700"})[normalizeStatus(s)]||"bg-red-100 text-red-700";}
function setLoading(button,on){button.disabled=on;button.querySelector(".loader")?.classList.toggle("hidden",!on);} function formatTime(ts){if(!ts)return "Just now"; if(ts?.toDate)return ts.toDate().toLocaleString(); const d=new Date(ts); return Number.isNaN(d.getTime())?"Just now":d.toLocaleString();} function formatError(e){return [e?.code,e?.message].filter(Boolean).join(": ")||"Unknown error";} function escapeHtml(v){return String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");} function escapeAttr(v){return escapeHtml(v);}
function showNotice(message){document.getElementById("notice-text").textContent=message;document.getElementById("notice").classList.remove("hidden");document.getElementById("notice").classList.add("flex");} window.closeNotice=()=>{document.getElementById("notice").classList.add("hidden");document.getElementById("notice").classList.remove("flex");};
render();
</script>
</body>
</html>
